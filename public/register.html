<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="nav">
    <a href="index.html">Home</a> | 
    <a href="login.html">Đăng nhập</a> | 
    <a href="register.html">Đăng ký</a>
</div>

<div class="container">
    <h2>Màn hình đăng ký</h2>
    <form onsubmit="registerUser(event)">
        <label>Username</label>
        <input type="text" id="regUser" required>

        <label>Mật khẩu</label>
        <input type="password" id="regPass" required>

        <label>Nhập lại mật khẩu</label>
        <input type="password" id="regRePass" required>

        <label>Email</label>
        <input type="email" id="regEmail" required>

        <button type="submit">Đăng ký</button>
    </form>
</div>

<footer>Lập trình web @2026</footer>

<script>
function registerUser(e) {
    e.preventDefault();
    let user = document.getElementById("regUser").value;
    let pass = document.getElementById("regPass").value;
    let repass = document.getElementById("regRePass").value;
    let email = document.getElementById("regEmail").value;

    if (pass !== repass) {
        alert("Mật khẩu nhập lại không khớp!");
        return;
    }

    // Lưu user vào localStorage (demo chỉ lưu 1 user)
    localStorage.setItem("username", user);
    localStorage.setItem("password", pass);
    localStorage.setItem("email", email);

    alert("Đăng ký thành công!");
    window.location.href = "login.html";
}
</script>
</body>
</html>
